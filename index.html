<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edu_FinanzasPersonales 💚</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/Recharts.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#060D1A; }
    ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:#1A2B40; border-radius:4px; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  </style>
</head>


<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useRef } = React;
const { AreaChart, Area, BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, Tooltip, ResponsiveContainer, LineChart, Line } = Recharts;

const CLP = n => new Intl.NumberFormat("es-CL",{style:"currency",currency:"CLP",maximumFractionDigits:0}).format(n||0);
const pct = n => `${Math.round(n||0)}%`;
const num = v => parseInt(String(v).replace(/\D/g,""))||0;
const fmt = v => num(v) ? num(v).toLocaleString("es-CL") : "";

const C = {
  bg:"#060D1A", card:"#0C1625", card2:"#111E30", border:"#1A2B40",
  teal:"#00D4AA", blue:"#4A9EFF", red:"#FF5C6A", amber:"#FFB347",
  green:"#00E676", purple:"#9B59B6", text:"#E8F0FE", muted:"#6B82A0", dim:"#2D4060",
};

// Cuentas básicas personalizadas
const BILLS = [
  { key:"luz",     label:"Luz",           icon:"💡", color:"#FFB347", tip:"Apaga equipos en standby y usa ampolletas LED." },
  { key:"agua",    label:"Agua",          icon:"💧", color:"#4A9EFF", tip:"Revisa goteras y reduce tiempo de ducha." },
  { key:"internet",label:"Internet",      icon:"📡", color:"#9B59B6", tip:"Compara planes cada año para mejores tarifas." },
  { key:"celular", label:"Teléfono celular",icon:"📱",color:"#00D4AA", tip:"Evalúa planes prepago si consumes poco." },
  { key:"Tarjeta de Crédito", label:"Tarjeta de Crédito",icon:"💳",color:"#4A9EFF", tip:"Junta dinero y evita el uso de la tarjeta." },
  { key:"arriendo",     label:"Arriendo/Dividendo de Vivienda", icon:"🏠", color:"#FF5C6A", tip:"Paga el dividendo o arriendo en los plazos para evitar interés." },
  { key:"alimentacion", label:"Alimentación", icon:"🛒", color:"#00E676", tip:"Compra en lugares mayorista, ocupa puntos para obtener descuentos."  },
  { key:"entretencion", label:"Entretención/deporte", icon:"🎮🏋️‍♂️", color:"#FFB347" , tip:"Invierte en deporte para tu vejez."},
  { key:"ahorro", label:"ahorro", icon:"🐷", color:"#00D4AA" , tip:"Siempre ahorra aunque sea poco, todo suma."},
];

// Otros gastos del hogar
const OTHER_CATS = [
 
  { key:"transporte",   label:"Transporte",   icon:"🚌", color:"#4A9EFF" },
  { key:"salud",        label:"Salud",        icon:"💊", color:"#9B59B6" },
   { key:"otros",        label:"Otros",        icon:"📦", color:"#6B82A0" },
];

const ALL_CATS = [...BILLS.map(b=>({ ...b, isBill:true })), ...OTHER_CATS];

const S = {
  app:{ background:C.bg, minHeight:"100vh", display:"flex", justifyContent:"center", fontFamily:"'Plus Jakarta Sans','Segoe UI',sans-serif", color:C.text },
  phone:{ width:"100%", maxWidth:430, display:"flex", flexDirection:"column", minHeight:"100vh", position:"relative" },
  screen:{ flex:1, overflowY:"auto", paddingBottom:90, paddingTop:8 },
  card:{ background:C.card, borderRadius:16, border:`1px solid ${C.border}`, padding:"16px 18px", marginBottom:12 },
  card2:{ background:C.card2, borderRadius:12, border:`1px solid ${C.border}`, padding:"12px 14px", marginBottom:8 },
  h1:{ fontSize:22, fontWeight:700, color:C.text, margin:0 },
  h2:{ fontSize:15, fontWeight:600, color:C.text, margin:"0 0 12px 0" },
  label:{ fontSize:11, fontWeight:600, color:C.muted, textTransform:"uppercase", letterSpacing:1 },
  row:{ display:"flex", alignItems:"center", justifyContent:"space-between" },
  badge: color => ({ background:color+"22", color, borderRadius:6, padding:"2px 8px", fontSize:11, fontWeight:600 }),
  btn:{ background:C.teal, color:"#000", border:"none", borderRadius:12, padding:"13px 20px", fontWeight:700, fontSize:14, cursor:"pointer", width:"100%" },
  btnSm:{ background:"transparent", color:C.teal, border:`1px solid ${C.teal}`, borderRadius:10, padding:"8px 14px", fontWeight:600, fontSize:12, cursor:"pointer" },
  input:{ background:C.card2, border:`1px solid ${C.border}`, borderRadius:10, padding:"11px 14px", color:C.text, fontSize:14, width:"100%", boxSizing:"border-box", outline:"none" },
  track:{ background:C.dim, borderRadius:99, height:7, overflow:"hidden" },
  px:{ paddingLeft:18, paddingRight:18 },
};

function MoneyInput({ label, value, onChange, placeholder="0", hint }) {
  return (
    <div style={{ marginBottom:12 }}>
      {label && <div style={{ ...S.label, marginBottom:4 }}>{label}</div>}
      <div style={{ position:"relative" }}>
        <span style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", fontSize:13, color:C.muted }}>$</span>
        <input type="text" inputMode="numeric" value={fmt(value)} placeholder={placeholder}
          onChange={e => onChange(num(e.target.value))}
          style={{ ...S.input, paddingLeft:26 }} />
      </div>
      {hint && <div style={{ fontSize:10, color:C.muted, marginTop:3 }}>💡 {hint}</div>}
    </div>
  );
}

// ─── SETUP ───────────────────────────────────────────────────────────────────
function SetupWizard({ onFinish }) {
  const [step, setStep] = useState(0);
  const [income, setIncome] = useState(0);
  const [savingsGoal, setSavingsGoal] = useState(10);
  const [bills, setBills] = useState({ luz:0, agua:0, internet:0, celular:0 });
  const [others, setOthers] = useState({ alimentacion:0, transporte:0, arriendo:0, salud:0, entretencion:0,Tarjetadecrédito:0, otros:0 });
  const totalBills = Object.values(bills).reduce((a,b)=>a+b,0);
  const totalOthers = Object.values(others).reduce((a,b)=>a+b,0);
  const savingsAmt = Math.round(income * savingsGoal/100);
  const totalExp = totalBills + totalOthers + savingsAmt;
  const available = income - totalExp;
  const STEPS = ["Ingresos","Cuentas","Otros gastos","Ahorro","Resumen"];
  const progress = ((step+1)/STEPS.length)*100;
  return (
    <div style={{ ...S.px, paddingTop:24, paddingBottom:30 }}>
      <div style={{ textAlign:"center", marginBottom:24 }}>
        <div style={{ fontSize:34, marginBottom:6 }}>💚</div>
        <div style={S.h1}>Configura tu finanzas</div>
        <div style={{ fontSize:12, color:C.muted, marginTop:4 }}>Paso {step+1} de {STEPS.length} — {STEPS[step]}</div>
        <div style={{ ...S.track, marginTop:10 }}>
          <div style={{ width:`${progress}%`, height:"100%", background:C.teal, borderRadius:99, transition:"width 0.4s ease" }} />
        </div>
      </div>

      {/* PASO 0: INGRESOS */}
      {step===0 && (
        <div>
          <div style={{ ...S.card, borderColor:C.teal+"44" }}>
            <div style={{ textAlign:"center", marginBottom:16 }}>
              <div style={{ fontSize:38 }}>💰</div>
              <div style={{ fontSize:17, fontWeight:700, marginTop:6 }}>¿Cuánto ganas al mes?</div>
              <div style={{ fontSize:12, color:C.muted, marginTop:4 }}>Ingresa tu sueldo neto + cualquier ingreso adicional</div>
            </div>
            <MoneyInput label="Ingreso mensual total" value={income} onChange={setIncome} placeholder="800.000" hint="Suma todos tus ingresos: sueldo, freelance, arriendo, etc." />
            {income>0 && <div style={{ background:C.teal+"15", border:`1px solid ${C.teal}33`, borderRadius:10, padding:"10px 14px", textAlign:"center" }}>
              <div style={{ fontSize:11, color:C.teal }}>Tu ingreso mensual</div>
              <div style={{ fontSize:24, fontWeight:800, color:C.teal }}>{CLP(income)}</div>
            </div>}
          </div>
          <button onClick={()=>income>0&&setStep(1)} style={{ ...S.btn, opacity:income>0?1:0.4 }}>Continuar →</button>
        </div>
      )}

      {/* PASO 1: CUENTAS */}
      {step===1 && (
        <div>
          <div style={S.card}>
            <div style={{ fontSize:15, fontWeight:700, marginBottom:4 }}>🧾 Cuentas del hogar</div>
            <div style={{ fontSize:12, color:C.muted, marginBottom:16, lineHeight:1.6 }}>Ingresa el promedio mensual de cada cuenta.</div>
            {BILLS.map(b => (
              <div key={b.key} style={{ ...S.card2, borderLeft:`3px solid ${b.color}`, padding:"10px 12px", marginBottom:8 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                  <span style={{ fontSize:20 }}>{b.icon}</span>
                  <span style={{ fontSize:13, fontWeight:700, color:C.text }}>{b.label}</span>
                </div>
                <MoneyInput label="" value={bills[b.key]} onChange={v=>setBills(p=>({...p,[b.key]:v}))} placeholder="0" hint={b.tip} />
              </div>
            ))}
            <div style={{ ...S.card2, background:C.teal+"0D", borderColor:C.teal+"44" }}>
              <div style={S.row}><span style={{ fontSize:13 }}>Total cuentas</span><span style={{ fontSize:16, fontWeight:700, color:C.teal }}>{CLP(totalBills)}</span></div>
              {income>0 && <div style={{ fontSize:11, color:C.muted, marginTop:4 }}>= {pct(totalBills/income*100)} de tu ingreso</div>}
            </div>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={()=>setStep(0)} style={{ ...S.btnSm, flex:1 }}>← Atrás</button>
            <button onClick={()=>setStep(2)} style={{ ...S.btn, flex:2 }}>Continuar →</button>
          </div>
        </div>
      )}

      {/* PASO 2: OTROS GASTOS */}
      {step===2 && (
        <div>
          <div style={S.card}>
            <div style={{ fontSize:15, fontWeight:700, marginBottom:4 }}>🛒 Otros gastos mensuales</div>
            <div style={{ fontSize:12, color:C.muted, marginBottom:16, lineHeight:1.6 }}>Estima tus gastos en cada categoría.</div>
            {OTHER_CATS.map(c => (
              <MoneyInput key={c.key} label={`${c.icon} ${c.label}`} value={others[c.key]} onChange={v=>setOthers(p=>({...p,[c.key]:v}))} />
            ))}
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={()=>setStep(1)} style={{ ...S.btnSm, flex:1 }}>← Atrás</button>
            <button onClick={()=>setStep(3)} style={{ ...S.btn, flex:2 }}>Continuar →</button>
          </div>
        </div>
      )}

      {/* PASO 3: AHORRO */}
      {step===3 && (
        <div>
          <div style={S.card}>
            <div style={{ fontSize:36, textAlign:"center", marginBottom:8 }}>🐷</div>
            <div style={{ fontSize:15, fontWeight:700, textAlign:"center", marginBottom:4 }}>Meta de ahorro mensual</div>
            <div style={{ fontSize:12, color:C.muted, textAlign:"center", marginBottom:20, lineHeight:1.6 }}>Lo ideal es ahorrar al menos el <strong style={{ color:C.teal }}>10%</strong> de tu ingreso. ¡Cuanto más, mejor!</div>
            <div style={{ textAlign:"center", marginBottom:16 }}>
              <div style={{ fontSize:44, fontWeight:800, color:savingsGoal>=10?C.teal:C.amber }}>{savingsGoal}%</div>
              <div style={{ fontSize:16, color:C.muted, marginTop:4 }}>{CLP(savingsAmt)} al mes</div>
            </div>
            <input type="range" min={1} max={50} step={1} value={savingsGoal} onChange={e=>setSavingsGoal(Number(e.target.value))} style={{ width:"100%", accentColor:C.teal, marginBottom:12 }} />
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:C.muted }}>
              <span>1% — Mínimo</span><span style={{ color:C.teal }}>10% — Recomendado</span><span>50% — Excelente</span>
            </div>
            {savingsGoal>=10 && <div style={{ background:C.teal+"15", border:`1px solid ${C.teal}33`, borderRadius:10, padding:"10px 14px", marginTop:14, textAlign:"center" }}>
              <div style={{ fontSize:12, color:C.teal, fontWeight:600 }}>🎉 ¡Excelente meta de ahorro!</div>
              <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>En 12 meses acumularás {CLP(savingsAmt*12)}</div>
            </div>}
            {savingsGoal<10 && <div style={{ background:C.amber+"15", border:`1px solid ${C.amber}33`, borderRadius:10, padding:"10px 14px", marginTop:14, textAlign:"center" }}>
              <div style={{ fontSize:12, color:C.amber, fontWeight:600 }}>⚠️ Intenta llegar al 10%</div>
              <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>Te falta subir {10-savingsGoal}% para la meta mínima recomendada.</div>
            </div>}
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={()=>setStep(2)} style={{ ...S.btnSm, flex:1 }}>← Atrás</button>
            <button onClick={()=>setStep(4)} style={{ ...S.btn, flex:2 }}>Ver resumen →</button>
          </div>
        </div>
      )}

      {/* PASO 4: RESUMEN */}
      {step===4 && (
        <div>
          <div style={{ ...S.card, borderColor:C.teal+"44" }}>
            <div style={{ textAlign:"center", marginBottom:16 }}>
              <div style={{ fontSize:36 }}>🎯</div>
              <div style={{ fontSize:17, fontWeight:700, marginTop:6 }}>Tu presupuesto personal</div>
            </div>
            {[
              { l:"💰 Ingreso mensual", v:CLP(income), c:C.green },
              { l:"🧾 Total cuentas", v:CLP(totalBills), c:C.blue },
              { l:"🛒 Otros gastos", v:CLP(totalOthers), c:C.muted },
              { l:"🐷 Ahorro ({savingsGoal}%)", v:CLP(savingsAmt), c:C.teal },
              { l:"✅ Dinero libre", v:CLP(available), c:available>=0?C.teal:C.red },
            ].map((r,i) => (
              <div key={i} style={{ ...S.row, padding:"10px 0", borderBottom:`1px solid ${C.border}` }}>
                <span style={{ fontSize:13, color:C.muted }}>{r.l.replace("{savingsGoal}",savingsGoal)}</span>
                <span style={{ fontSize:15, fontWeight:700, color:r.c }}>{r.v}</span>
              </div>
            ))}
            {available<0 && <div style={{ background:C.red+"15", border:`1px solid ${C.red}33`, borderRadius:10, padding:"10px 14px", marginTop:12, fontSize:12, color:C.red }}>⚠️ Tus gastos superan tu ingreso. Ajusta antes de continuar.</div>}
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={()=>setStep(3)} style={{ ...S.btnSm, flex:1 }}>← Atrás</button>
           <button onClick={()=>onFinish({ income, bills, others, savingsGoal, savingsAmt })} style={{ ...S.btn, flex:2 }}>Comenzar 🚀</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── INICIO ───────────────────────────────────────────────────────────────────
function HomeScreen({ data, onEdit }) {
  const totalBills = Object.values(data.bills).reduce((a,b)=>a+b,0);
  const totalOthers = Object.values(data.others).reduce((a,b)=>a+b,0);
  const totalExp = totalBills + totalOthers + data.savingsAmt;
  const available = data.income - totalExp;
  const savPct = data.savingsGoal;
  const score = Math.max(5, Math.min(100, Math.round(
    (savPct>=10?30:savPct*3) +
    (available>=0?Math.min(40,available/data.income*100):0) +
    (totalBills/Math.max(1,data.income)<0.2?20:10) +
    10
  )));
  const color = score>=70?C.teal:score>=40?C.amber:C.red;
  const label = score>=70?"Saludable 🌱":score>=40?"Atención ⚠️":"Crítico 🚨";
  const r=52,cx=64,cy=64,sw=8,circ=2*Math.PI*r;
  const barData = [
    ...BILLS.map(b=>({ cat:b.icon, real:data.bills[b.key]||0, tipo:"cuenta" })),
    { cat:"🐷", real:data.savingsAmt, tipo:"ahorro" },
    { cat:"🛒", real:data.others.alimentacion||0, tipo:"otro" },
    { cat:"🏠", real:data.others.arriendo||0, tipo:"cuenta" },
    { cat:"💳", real:data.others.tarjetadecrédito ||0, tipo:"cuenta" },
    { cat:"🎮🏋️‍♂️", real:data.others.entretencion ||0, tipo:"cuenta" },
  ].filter(d=>d.real>0);
  return (
    <div style={S.px}>
      <div style={{ paddingTop:20, paddingBottom:8, ...S.row }}>
        <div><div style={{ fontSize:12, color:C.muted }}>Mi dashboard</div><div style={S.h1}>FinZen Personal 💚</div></div>
        <button onClick={onEdit} style={{ ...S.btnSm, padding:"6px 12px", fontSize:11 }}>✏️ Editar</button>
      </div>
      {/* Score */}
      <div style={S.card}>
        <div style={{ display:"flex", alignItems:"center", gap:20 }}>
          <svg width={128} height={128} viewBox="0 0 128 128">
            <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.dim} strokeWidth={sw}/>
            <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={sw}
              strokeDasharray={`${(score/100)*circ} ${circ}`} strokeLinecap="round"
              transform={`rotate(-90 ${cx} ${cy})`} style={{ transition:"stroke-dasharray 1s ease" }}/>
            <text x={cx} y={cy-6} textAnchor="middle" fill={color} fontSize={26} fontWeight={800}>{score}</text>
            <text x={cx} y={cy+14} textAnchor="middle" fill={C.muted} fontSize={11}>/100</text>
          </svg>
          <div>
            <div style={S.label}>Salud financiera</div>
            <div style={{ fontSize:18, fontWeight:700, color, marginTop:4 }}>{label}</div>
            <div style={{ fontSize:12, color:C.muted, marginTop:6, lineHeight:1.6 }}>
              {score>=70?"Vas por buen camino. Mantén tu ahorro y mira nuevas fuentes de ingreso.":score>=40?"Revisa tus cuentas y aumenta tu porcentaje de ahorro.":"Tus gastos son altos. Prioriza reducir cuentas y crear ingresos."}
            </div>
          </div>
        </div>
      </div>
      {/* Mini tarjetas */}
      <div style={{ display:"flex", gap:8, marginBottom:12 }}>
        {[
          { l:"Ingreso", v:CLP(data.income), c:C.green, i:"💰" },
          { l:"Gastos", v:CLP(totalExp), c:C.red, i:"📤" },
          { l:"Libre", v:CLP(available), c:available>=0?C.teal:C.red, i:available>=0?"✅":"🚨" },
        ].map((m,i)=>(
          <div key={i} style={{ ...S.card2, flex:1, minWidth:0 }}>
            <div style={{ fontSize:16 }}>{m.i}</div>
            <div style={{ fontSize:10, color:C.muted, marginTop:3 }}>{m.l}</div>
            <div style={{ fontSize:12, fontWeight:700, color:m.c, marginTop:2 }}>{m.v}</div>
          </div>
        ))}
      </div>
      {/* Ahorro */}
      <div style={{ ...S.card, borderColor:C.teal+"44", background:C.teal+"08" }}>
        <div style={S.row}>
          <div><div style={S.label}>Meta de ahorro</div><div style={{ fontSize:22, fontWeight:800, color:savPct>=10?C.teal:C.amber, marginTop:2 }}>{savPct}%</div></div>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:11, color:C.muted }}>Mensual</div>
            <div style={{ fontSize:18, fontWeight:700, color:C.teal }}>{CLP(data.savingsAmt)}</div>
            <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>Anual: {CLP(data.savingsAmt*12)}</div>
          </div>
        </div>
        <div style={{ ...S.track, marginTop:10 }}>
          <div style={{ width:`${Math.min(100,savPct/20*100)}%`, height:"100%", background:savPct>=10?C.teal:C.amber, borderRadius:99 }} />
        </div>
        <div style={{ fontSize:10, color:C.muted, marginTop:4 }}>Meta óptima: 20% ({CLP(data.income*0.2)}/mes)</div>
      </div>
      {/* Cuentas resumen */}
      <div style={S.card}>
        <div style={S.h2}>🧾 Cuentas del mes</div>
        {BILLS.map(b=>{
          const val = data.bills[b.key]||0;
          if(!val) return null;
          return (
            <div key={b.key} style={{ ...S.row, padding:"8px 0", borderBottom:`1px solid ${C.border}` }}>
              <span style={{ fontSize:13 }}>{b.icon} {b.label}</span>
              <span style={{ fontSize:14, fontWeight:700, color:b.color }}>{CLP(val)}</span>
            </div>
          );
        })}
        <div style={{ ...S.row, padding:"10px 0", marginTop:2 }}>
          <span style={{ fontSize:13, fontWeight:700 }}>Total cuentas</span>
          <span style={{ fontSize:16, fontWeight:800, color:C.blue }}>{CLP(totalBills)}</span>
        </div>
      </div>
      {/* Distribución */}
      <div style={S.card}>
        <div style={S.h2}>Distribución de ingresos</div>
        <ResponsiveContainer width="100%" height={150}>
          <BarChart data={barData} margin={{ top:5,right:5,left:-30,bottom:0 }}>
            <XAxis dataKey="cat" tick={{ fill:C.muted, fontSize:14 }} axisLine={false} tickLine={false}/>
            <YAxis tick={{ fill:C.muted, fontSize:9 }} axisLine={false} tickLine={false} tickFormatter={v=>`$${Math.round(v/1000)}k`}/>
            <Tooltip contentStyle={{ background:C.card2, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, fontSize:11 }} formatter={v=>CLP(v)}/>
            <Bar dataKey="real" radius={[5,5,0,0]}>
              {barData.map((e,i)=><Cell key={i} fill={e.tipo==="cuenta"?C.blue:e.tipo==="ahorro"?C.teal:C.muted}/>)}
            </Bar>
          </BarChart>

  const proyData = Array.from({length:13},(_,m)=>({
    mes: m===0?"Hoy":`M${m}`,

  return (
    <div style={S.px}>

// ─── IA ASESOR ───────────────────────────────────────────────────────────────
function AIScreen({ data }) {
  const [msgs, setMsgs] = useState([{ 
    role: "assistant", 
    content: "¡Hola! Soy tu asesor Finanzas_personales 💚\n\nHe analizado tus datos: luz, agua, transporte y metas de ahorro. ¿En qué área te gustaría profundizar hoy?" 
  }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const ref = useRef(null);

  // Cálculos rápidos para el análisis
  const totalBills = Object.values(data.bills).reduce((a, b) => a + b, 0);
  const totalOthers = Object.values(data.others).reduce((a, b) => a + b, 0);
  const totalExp = totalBills + totalOthers + data.savingsAmt;
  const surplus = data.income - totalExp;

  useEffect(() => { ref.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs, loading]);

  const send = () => {
    if (!input.trim() || loading) return;
    const msg = input.trim();
    const query = msg.toLowerCase();
    
    setInput("");
    setMsgs(p => [...p, { role: "user", content: msg }]);
    setLoading(true);

    // Simulamos un pequeño tiempo de "pensamiento" de la IA
    setTimeout(() => {
      let response = "";

      // LÓGICA DE ANÁLISIS DE DATOS
      if (query.includes("luz") || query.includes("electricidad")) {
        const pct = ((data.bills.luz / data.income) * 100).toFixed(1);
        response = `Tu cuenta de luz es de ${CLP(data.bills.luz)}. Esto representa un ${pct}% de tu sueldo. 💡 Acción: Revisa el sello de tus ventanas; el aire filtrado hace que gastes más en calefacción o aire acondicionado.`;
      } 
      else if (query.includes("ahorro") || query.includes("ahorrar")) {
        response = `Actualmente estás ahorrando el ${data.savingsGoal}% (${CLP(data.savingsAmt)}). 📈 Acción: Si logras reducir un 10% tus "Otros Gastos", podrías subir tu ahorro a ${CLP(data.savingsAmt + (totalOthers * 0.1))} mensual.`;
      }
      else if (query.includes("gastos") || query.includes("bien") || query.includes("analiza")) {
        if (surplus > 0) {
          response = `¡Vas por buen camino! Después de todos tus gastos y ahorros, te quedan ${CLP(surplus)} libres. 💳 Acción: No gastes ese excedente hoy; ponlo en una cuenta de interés diario para que crezca.`;
        } else {
          response = `Atención: Tus gastos están muy ajustados a tus ingresos. ⚠️ Acción: Revisa el item de '${Object.keys(data.others).sort((a,b)=>data.others[b]-data.others[a])[0]}', es tu gasto más alto fuera de las cuentas fijas.`;
        }
      }
      else if (query.includes("comida") || query.includes("alimentación")) {
        response = `Gastas ${CLP(data.others.alimentacion)} en alimentación. 🛒 Acción: Intenta hacer 'meal prep' los domingos para evitar comprar comida rápida durante la semana laboral.`;
      }
      else {
        response = "Interesante pregunta. Basado en tu perfil, lo mejor es enfocarte en optimizar tus gastos variables. ¿Quieres que analicemos tu meta de ahorro o tus cuentas básicas?";
      }

      setMsgs(p => [...p, { role: "assistant", content: response }]);
      setLoading(false);
    }, 800);
  };

  const quick = ["¿Cómo bajo mi cuenta de luz?", "¿Cómo ahorro más?", "¿Estoy bien con mis gastos?", "Analiza mi alimentación"];

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "calc(100vh - 90px)", paddingTop: 12 }}>
      <div style={{ ...S.px, paddingBottom: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 42, height: 42, borderRadius: 12, background: C.teal + "22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>🤖</div>
          <div>
            <div style={{ fontSize: 15, fontWeight: 700 }}>FinZen IA Local</div>
            <div style={{ fontSize: 11, color: C.teal }}>● Análisis de datos activo</div>
          </div>
        </div>
      </div>

      <div style={{ flex: 1, overflowY: "auto", padding: "0 18px" }}>
        {msgs.map((m, i) => (
          <div key={i} style={{ marginBottom: 10, display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start", animation: "fadeIn 0.3s both" }}>
            <div style={{ 
              maxWidth: "84%", 
              background: m.role === "user" ? C.teal : C.card2, 
              color: m.role === "user" ? "#000" : C.text, 
              borderRadius: m.role === "user" ? "14px 14px 4px 14px" : "14px 14px 14px 4px", 
              padding: "10px 14px", 
              fontSize: 13, 
              lineHeight: 1.6, 
              whiteSpace: "pre-wrap", 
              border: m.role === "assistant" ? `1px solid ${C.border}` : "none" 
            }}>
              {m.content}
            </div>
          </div>
        ))}
        {loading && <div style={{ display: "flex", gap: 4, padding: "10px 14px", background: C.card2, borderRadius: "14px 14px 14px 4px", width: 58, marginBottom: 10, border: `1px solid ${C.border}` }}>
          {[0, 1, 2].map(i => <div key={i} style={{ width: 6, height: 6, borderRadius: "50%", background: C.teal, animation: `bounce 1s ${i * 0.2}s infinite` }} />)}
        </div>}
        <div ref={ref} />
      </div>

      <div style={{ padding: "8px 18px" }}>
        <div style={{ display: "flex", gap: 6, marginBottom: 8, overflowX: "auto", paddingBottom: 2 }}>
          {quick.map((q, i) => <button key={i} onClick={() => setInput(q)} style={{ ...S.btnSm, whiteSpace: "nowrap", fontSize: 10, padding: "5px 10px", borderRadius: 20, flexShrink: 0 }}>{q}</button>)}
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === "Enter" && send()} placeholder="Escribe aquí..." style={{ ...S.input, flex: 1 }} />
          <button onClick={send} disabled={loading || !input.trim()} style={{ background: loading || !input.trim() ? C.dim : C.teal, color: loading || !input.trim() ? C.muted : "#000", border: "none", borderRadius: 10, padding: "10px 14px", fontWeight: 700, cursor: "pointer", fontSize: 16 }}>→</button>
        </div>
      </div>
    </div>
  );
}

  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [data, setData] = useState(null);
  const [screen, setScreen] = useState("home");
  if(!data) return (
    <div style={S.app}><div style={S.phone}><div style={S.screen}>
      <SetupWizard onFinish={d=>{ setData(d); setScreen("home"); }}/>
    </div></div></div>
  );
  return (
    <div style={S.app}>
      <div style={S.phone}>
        <div style={S.screen}>
          {screen==="home"    && <HomeScreen    data={data} onEdit={()=>setData(null)}/>}
          {screen==="bills"   && <BillsScreen   data={data} setData={setData}/>}
          {screen==="savings" && <SavingsScreen data={data} setData={setData}/>}
          {screen==="tips"    && <TipsScreen    data={data}/>}
          {screen==="ai"      && <AIScreen      data={data}/>}
        </div>
        <BottomNav active={screen} setActive={setScreen}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
